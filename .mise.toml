[tools]
go = "1.25"
hugo-extended = "0.163.1"
node = "24"
python = "3.13"
uv = "0.11.16"

[tasks.sync]
description = "Install Python dependencies with uv"
run = "uv sync --frozen"

[tasks.format]
description = "Format markdown documents"
run = "uv run mdformat --no-mkdocs-math --exclude '.venv/**' --exclude '.pytest_cache/**' --exclude 'site/**' ."

[tasks.format-check]
description = "Check markdown formatting"
run = "uv run mdformat --check --no-mkdocs-math --exclude '.venv/**' --exclude '.pytest_cache/**' --exclude 'site/**' ."

[tasks.build]
description = "Build the documentation site"
run = "uv run properdocs build -f mkdocs.yml --strict"

[tasks.hugo-convert]
description = "Convert MkDocs content to Hugo content"
run = "python scripts/convert_mkdocs_to_hugo.py --clean"

[tasks.hugo-sync]
description = "Install Hugo/Docsy npm dependencies"
run = "npm ci"

[tasks.hugo-build]
description = "Build the Hugo/Docsy preview"
depends = ["hugo-sync", "hugo-convert"]
run = "hugo --minify --destination site/hugo-preview"

[tasks.hugo-serve]
description = "Live preview Hugo site with auto-reload"
depends = ["hugo-sync", "hugo-convert"]
run = "hugo serve --buildDrafts --disableFastRender --bind 0.0.0.0"

[tasks.hugo-check]
description = "Validate Hugo config and template rendering"
depends = ["hugo-sync", "hugo-convert"]
run = "hugo --gc --minify --destination /tmp/hugo-check && rm -rf /tmp/hugo-check"

[tasks.hugo-test]
description = "Run converter tests and Hugo build validation"
depends = ["unit", "hugo-check"]

[tasks.rss]
description = "Generate RSS and Atom feeds"
run = "uv run python -m wasoc.rss"

[tasks.lint]
description = "Lint Python and TOML"
run = "uv run ruff check . && uv run taplo check pyproject.toml .mise.toml"

[tasks.unit]
description = "Run unit tests"
run = "uv run python -m pytest"

[tasks.test]
description = "Run repository checks"
depends = ["format-check", "lint", "unit", "build", "rss"]
