name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: mise run sync

      - name: Format markdown
        run: mise run format

      - name: Build site
        run: mise run build

      - name: Build RSS feeds
        run: mise run rss

      - name: Checkout Hugo preview branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: hugo
          path: hugo-preview-src

      - name: Install Hugo preview tools
        run: mise --cd hugo-preview-src install --yes

      - name: Install Hugo preview npm dependencies
        run: mise --cd hugo-preview-src exec -- npm ci

      - name: Convert current content for Hugo preview
        run: >-
          mise --cd hugo-preview-src exec --
          python scripts/convert_mkdocs_to_hugo.py
          --source-root "$GITHUB_WORKSPACE"
          --target-root "$GITHUB_WORKSPACE/hugo-preview-src"
          --clean

      - name: Build Hugo preview
        run: >-
          mise --cd hugo-preview-src exec --
          hugo --minify
          --destination "$GITHUB_WORKSPACE/site/hugo-preview"

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
