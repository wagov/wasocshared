name: Hugo CI
 
on:
  push:
    branches: [hugo]
  pull_request:
    branches: [main]
  workflow_dispatch:
 
permissions:
  contents: read
 
jobs:
  validate:
    name: Build and validate Hugo preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout hugo branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'hugo' }}
          fetch-depth: 0
 
      - name: Checkout main content
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: main
          path: main-src
 
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
 
      - name: Install tools
        run: mise install --yes
 
      - name: Install npm dependencies
        run: mise exec -- npm ci
 
      - name: Run converter tests
        run: mise exec -- uv run python -m pytest tests/test_converter.py -q
 
      - name: Convert main content for Hugo
        run: >-
          mise exec --
          python scripts/convert_mkdocs_to_hugo.py
          --source-root "$GITHUB_WORKSPACE/main-src"
          --target-root "$GITHUB_WORKSPACE"
          --clean
 
      - name: Build Hugo site
        run: mise exec -- hugo --gc --minify --destination site/hugo-preview
 
      - name: Link check (internal only)
        uses: lycheeverse/lychee-action@5c4ee817f9e8dcb452c4ce085ae4df4917f88805 # v2.4.1
        with:
          args: >-
            --only-anchors
            --no-progress
            --exclude '^https?://'
            'site/hugo-preview/**/*.html'
          fail: false
 
      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@4363ea04a71f5b3f559012a681ec7f8c840b7844 # v4.2.0
        with:
          name: hugo-preview-pr-${{ github.event.number }}
          path: site/hugo-preview
          retention-days: 14
 
      - name: Comment PR with artifact link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@ed597969edc7f6f895f2a7bcebc753c1c6867f65 # v8.0.0
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📦 Hugo preview built successfully. Download the `hugo-preview-pr-' + context.issue.number + '` artifact from the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ') to preview locally.'
            })
